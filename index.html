    <script>
      function isAppInstalled() {
  // Custom URL Scheme kontrolü yaparak uygulamanın yüklü olup olmadığını kontrol eder
  // Uygulamanın URL şemasını burada "app-scheme" olarak varsayalım
  var appScheme = "app://gedik.com";

 

  // Bir iframe oluşturup URL şemasını deneyelim
  var iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = appScheme;
  document.body.appendChild(iframe);

 

  // Uygulama URL şemasının açılıp açılmadığını kontrol edelim
  setTimeout(function() {
    document.body.removeChild(iframe);
    alert("Uygulama yüklü: ", !iframe.contentWindow);
  }, 2000);
}

 

isAppInstalled();
    </script>
